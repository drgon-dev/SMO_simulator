                <label>Название: <input id="prop-name" value="${this._esc(node.name)}"></label>
                <label>Дисциплина:
                    <select id="prop-disc">
                        <option value="FIFO" ${node.discipline==='FIFO'?'selected':''}>FIFO</option>
                        <option value="LIFO" ${node.discipline==='LIFO'?'selected':''}>LIFO</option>
                        <option value="SF" ${node.discipline==='SF'?'selected':''}>SF (Shortest First)</option>
                    </select>
                </label>
                <label>Каналов (C): <input id="prop-channels" type="number" min="1" value="${node.numChannels}"></label>
                <label>Распределение обслуживания:
                    <select id="prop-servdist">
                        <option value="constant" ${node.serviceDistribution==='constant'?'selected':''}>Фиксированное</option>
                        <option value="exponential" ${node.serviceDistribution==='exponential'?'selected':''}>Экспоненциальное</option>
                    </select>
                </label>
                <label id="prop-servconst-label" style="${node.serviceDistribution!=='constant'?'display:none':''}">Время обслуживания: <input id="prop-servconst" type="number" step="0.1" min="0.01" value="${node.serviceConst}"></label>
                <label id="prop-servmu-label" style="${node.serviceDistribution!=='exponential'?'display:none':''}">Среднее (1/μ): <input id="prop-servmu" type="number" step="0.1" min="0.01" value="${node.serviceMu}"></label>
                <label>Макс. длина очереди (0=без огр.): <input id="prop-maxq" type="number" min="0" value="${node.maxQueueLength}"></label>
                <label>Seed: <input id="prop-seed" type="number" min="0" value="${node.seed}"></label>
                <div style="font-size:10px;color:var(--text2)">В очереди: ${node.waitingQueue.length} | Занято каналов: ${node.busyChannels}/${node.numChannels}</div>
              `;
            }
            _bindQueueProps(node, container) {
                const apply = () => {
                    node.name = document.getElementById('prop-name').value || 'Очередь';
                    node.discipline = document.getElementById('prop-disc').value;
                    node.numChannels = Math.max(1, parseInt(document.getElementById('prop-channels').value) ||
                        1);
                    node.serviceDistribution = document.getElementById('prop-servdist').value;
                    node.serviceConst = parseFloat(document.getElementById('prop-servconst').value) || 1;
                    node.serviceMu = parseFloat(document.getElementById('prop-servmu').value) || 1;
                    node.maxQueueLength = parseInt(document.getElementById('prop-maxq').value) || 0;
                    node.seed = parseInt(document.getElementById('prop-seed').value) || 100;
                    node.prng.setSeed(node.seed);
                    this.renderer.draw();
                };
                container.querySelectorAll('input, select').forEach(el => {
                    el.addEventListener('change', apply);
                    el.addEventListener('input', apply);
                });
                document.getElementById('prop-servdist').addEventListener('change', () => {
                    const dist = document.getElementById('prop-servdist').value;
                    document.getElementById('prop-servconst-label').style.display = dist === 'constant' ?
                        '' : 'none';
                    document.getElementById('prop-servmu-label').style.display = dist === 'exponential' ?
                        '' : 'none';
                    apply();
                });
            }
            _sinkPropsHTML(node) {
                return `
                <label>Название: <input id="prop-name" value="${this._esc(node.name)}"></label>
                <div style="font-size:10px;color:var(--text2)">Принято заявок: ${node.receivedCount}</div>
              `;
            }
            _bindSinkProps(node, container) {
                container.querySelector('#prop-name').addEventListener('input', () => {
                    node.name = document.getElementById('prop-name').value || 'Сток';
                    this.renderer.draw();
                });
            }
            _connPropsHTML(conn) {
                return `
                <div style="font-size:12px;color:var(--text2)">Соединение #${conn.id}</div>
                <div style="font-size:11px;">От: <b>${this._esc(conn.fromNode.name)}</b> → К: <b>${this._esc(conn.toNode.name)}</b></div>
                <label>Вес (вероятность): <input id="prop-weight" type="number" step="0.01" min="0.01" value="${conn.weight}"></label>
              `;
            }
            _bindConnProps(conn, container) {
                container.querySelector('#prop-weight').addEventListener('input', () => {
                    conn.weight = Math.max(0.01, parseFloat(document.getElementById('prop-weight').value) ||
                        1);
                    this.renderer.draw();
                });
            }
            _esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g,
                    '&quot;'); }
            _updateChartsForSelection() {
                if (this.selectedElement instanceof QueueNode && this.simulation.running) {
                    const time = this.simulation.currentTime;
                    this.selectedElement.stats.snapshot(time);
                    this.chartsManager.updateForNode(this.selectedElement, time);
                } else if (this.selectedElement instanceof QueueNode) {
                    this.chartsManager.updateForNode(this.selectedElement, this.simulation.currentTime || 0);
                } else {
                    this.chartsManager.clearAll();
                }
            }
            _updateStatusBar(state) {
                const el = document.getElementById('sstate');
                switch (state) {
                    case 'running':
                        el.textContent = '▶ Выполняется';
                        el.style.color = '#4ec9b0';
                        break;
                    case 'paused':
                        el.textContent = '⏸ Пауза';
                        el.style.color = '#e8b456';
                        break;
                    case 'finished':
                        el.textContent = '✓ Завершено';
                        el.style.color = '#4ec9b0';
                        break;
                    default:
                        el.textContent = '⏹ Остановлено';
                        el.style.color = '#e05570';
                }
            }
            _saveTopology() {
                const data = {
                    nodes: this.nodes.map(n => n.toJSON()),
                    connections: this.connections.map(c => c.toJSON()),
                    nextId: this.nextId,
                };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'smo_topology.json';
                a.click();
                URL.revokeObjectURL(url);
            }
            _loadTopology(event) {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        this._applyTopology(data);
                    } catch (err) {
                        alert('Ошибка загрузки файла: ' + err.message);
                    }
                };
                reader.readAsText(file);
                event.target.value = '';
            }
            _applyTopology(data) {
                this.simulation.reset();
                this.chartsManager.clearAll();
                const nodeMap = new Map();
                this.nodes = [];
                for (const nd of data.nodes) {
                    let node;
                    switch (nd.type) {
                        case 'source':
                            node = SourceNode.fromJSON(nd);
                            break;
                        case 'queue':
                            node = QueueNode.fromJSON(nd);
                            break;
                        case 'sink':
                            node = SinkNode.fromJSON(nd);
                            break;
                    }
                    if (node) {
                        this.nodes.push(node);
                        nodeMap.set(node.id, node);
                    }
                }
                this.nextId = data.nextId || (Math.max(...this.nodes.map(n => n.id), 0) + 1);
                this.connections = [];
                for (const cd of data.connections) {
                    const fromNode = nodeMap.get(cd.fromNodeId);
                    const toNode = nodeMap.get(cd.toNodeId);
                    if (fromNode && toNode) {
                        const conn = new Connection(cd.id || this.nextId++, fromNode, toNode, cd.weight || 1);
                        this.connections.push(conn);
                        fromNode.connectionsOut.push(conn);
                    }
                }
                this.selectedElement = null;
                this.renderer.selectedElement = null;
                this.renderer.nodes = this.nodes;
                this.renderer.connections = this.connections;
                this.simulation.nodes = this.nodes;
                this.simulation.connections = this.connections;
                this._updatePropsPanel();
                this.renderer.draw();
            }
            _renderLoop() {
                this.renderer.draw();
                requestAnimationFrame(() => this._renderLoop());
            }
        }

        // ==================== STARTUP ====================
        document.addEventListener('DOMContentLoaded', () => {
            const app = new App();
            // Expose for debugging
            window._app = app;
            console.log('Симулятор СМО готов. Используйте кнопки панели инструментов для создания узлов.');
            console.log('Перетаскивайте от выходного порта (оранжевый) к входному (зелёный) для создания соединений.');
            console.log('Выберите очередь и запустите симуляцию для просмотра графиков в реальном времени.');
        });
    </script>
</body>
